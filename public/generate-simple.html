<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Notation (Simple)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-top: 0; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        button:hover { background: #45a049; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background: #f0f0f0;
            min-height: 100px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-word;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 400px;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .progress { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .info { background: #e7f3ff; color: #004085; border: 1px solid #b8daff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Simple Notation Generator</h1>
        <p>This generates placeholder notation PNG files for testing the VR app.</p>
        
        <button id="generateBtn" onclick="generateNotation()">Generate Test Notation PNGs</button>
        
        <div id="status" class="info">ℹ️ Click button to generate 2 placeholder PNG files (8MB each)</div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const generateBtn = document.getElementById('generateBtn');

        function log(message, type = 'progress') {
            console.log(message);
            statusDiv.textContent += message + '\n';
            statusDiv.scrollTop = statusDiv.scrollHeight;
            
            if (type === 'error') {
                statusDiv.className = 'error';
            } else if (type === 'success') {
                statusDiv.className = 'success';
            } else if (type === 'info') {
                statusDiv.className = 'info';
            } else {
                statusDiv.className = 'progress';
            }
        }

        async function generateNotation() {
            generateBtn.disabled = true;
            statusDiv.textContent = '⏳ Generating notation PNGs...\n';
            statusDiv.className = 'progress';

            try {
                // Generate 2 large white placeholder canvases (4096 x 1024)
                const width = 4096;
                const height = 1024;
                
                for (let i = 0; i < 2; i++) {
                    log(`📝 Creating notation_slice_${i}.png...`);
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // White background
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, width, height);
                    
                    // Draw staff lines (music notation style)
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    
                    for (let stave = 0; stave < 3; stave++) {
                        const baseY = 100 + (stave * 250);
                        for (let line = 0; line < 5; line++) {
                            const y = baseY + (line * 40);
                            ctx.beginPath();
                            ctx.moveTo(50, y);
                            ctx.lineTo(width - 50, y);
                            ctx.stroke();
                        }
                    }
                    
                    // Add measure numbers
                    ctx.fillStyle = '#666';
                    ctx.font = 'bold 24px Arial';
                    for (let m = 0; m < 20; m++) {
                        const x = 100 + (m * 190);
                        ctx.fillText(`${i * 20 + m + 1}`, x, 50);
                    }
                    
                    // Draw notes
                    const notePositions = ['C', 'D', 'E', 'F', 'G'];
                    const lineHeights = [0, 40, 80, 120, 160]; // Position on staff
                    
                    for (let stave = 0; stave < 3; stave++) {
                        const baseY = 100 + (stave * 250);
                        
                        for (let m = 0; m < 20; m++) {
                            const measureX = 120 + (m * 190);
                            
                            // Draw 4 quarter notes per measure
                            for (let n = 0; n < 4; n++) {
                                const noteX = measureX + (n * 40);
                                const lineIdx = Math.floor(Math.random() * lineHeights.length);
                                const noteY = baseY + lineHeights[lineIdx];
                                
                                // Note head (filled ellipse)
                                ctx.fillStyle = '#000';
                                ctx.beginPath();
                                ctx.ellipse(noteX, noteY, 8, 10, 0, 0, 2 * Math.PI);
                                ctx.fill();
                                
                                // Note stem
                                ctx.strokeStyle = '#000';
                                ctx.lineWidth = 1.5;
                                ctx.beginPath();
                                ctx.moveTo(noteX + 8, noteY - 8);
                                ctx.lineTo(noteX + 8, noteY - 50);
                                ctx.stroke();
                            }
                        }
                    }
                    
                    // Convert to blob and download
                    await new Promise((resolve) => {
                        canvas.toBlob((blob) => {
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.href = url;
                            link.download = `notation_slice_${i}.png`;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            URL.revokeObjectURL(url);
                            
                            const sizeKB = (blob.size / 1024).toFixed(1);
                            log(`   ✓ Downloaded notation_slice_${i}.png (${sizeKB} KB)`);
                            resolve();
                        }, 'image/png', 0.9);
                    });
                    
                    // Small delay between downloads
                    await new Promise(r => setTimeout(r, 500));
                }

                log('\n✅ Successfully generated 2 notation slices!', 'success');
                log('\n📁 NEXT STEPS:', 'success');
                log('1. Check your Downloads folder', 'success');
                log('2. Create the folder: public/assets/', 'success');
                log('3. Move notation_slice_0.png and notation_slice_1.png there', 'success');
                log('4. Refresh http://localhost:5174', 'success');
                log('5. The app will load the pre-computed textures!', 'success');
                
                generateBtn.disabled = false;

            } catch (error) {
                log(`\n❌ Error: ${error.message}`, 'error');
                console.error(error);
                generateBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
