<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    <link rel="icon" href="data:,">    <title>Marching Madness VR</title>
    <style>
      html, body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #desktopUI {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 100;
        background: rgba(0, 0, 0, 0.9);
        padding: 20px;
        border-radius: 15px;
        min-width: 300px;
      }
      #desktopUI.hidden {
        display: none;
      }
      #desktopUI h1 {
        color: #FFD700;
        font-size: 24px;
        margin: 0 0 15px 0;
        font-family: Arial, sans-serif;
      }
      #songButtons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .songBtn {
        padding: 8px 12px;
        font-size: 12px;
        border: 2px solid #333366;
        background-color: #333366;
        color: white;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
        min-width: 90px;
        font-weight: bold;
      }
      .songBtn:hover {
        background-color: #4444aa;
        border-color: #5555bb;
      }
      .songBtn.selected {
        background-color: #1155aa;
        border-color: #FFD700;
        border-width: 3px;
      }
      #startBtn {
        padding: 10px 30px;
        font-size: 16px;
        font-weight: bold;
        background-color: #228822;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      #startBtn:hover {
        background-color: #33aa33;
        transform: scale(1.05);
      }
      #startBtn:active {
        transform: scale(0.95);
      }
      .subtitle {
        margin-bottom: 15px;
        color: #aaaaaa;
        font-size: 12px;
      }
    </style>
    <!-- Load Ammo.js script directly as it often works best globally for Babylon -->
    <script src="https://rawcdn.githack.com/kripken/ammo.js/99d0ec0b1e26d7ccc13e013caba8e8a5c98d953b/builds/ammo.wasm.js"></script>
  </head>
  <body>
    <div id="desktopUI">
      <h1>MARCHING MADNESS</h1>
      <div class="subtitle">Select a song and click START</div>
      <div id="songButtons"></div>
      <label style="display:block;margin-bottom:15px;color:#aaa;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="autoMarchCheck" checked style="margin-right:6px;" />Auto-march (follow drill)
      </label>
      <button id="startBtn">START GAME</button>
    </div>
    <div id="flyHUD" style="display:none;position:absolute;top:10px;left:10px;z-index:10;background:rgba(0,0,0,0.7);color:#0f0;padding:6px 14px;border-radius:8px;font-family:monospace;font-size:14px;pointer-events:none;">FREE FLY &mdash; F to exit &mdash; WASD + mouse</div>
    <canvas id="renderCanvas" touch-action="none"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
